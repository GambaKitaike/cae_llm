# ============================================================
# Phase 1: Continued Pre-Training (CPT) Configuration
# Base model: llm-jp/llm-jp-3-1.8b
# Target VRAM: 8 GB (QLoRA 4-bit)
# ============================================================

model:
  name: "llm-jp/llm-jp-3-1.8b"
  trust_remote_code: true
  # 4-bit quantization for VRAM efficiency
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  # llm-jp-3 (GPT-NeoX-like) attention + MLP projection layers
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "outputs/cpt"
  num_train_epochs: 1                       # CPT は 1 epoch で十分（103k サンプル × 1）
  per_device_train_batch_size: 1            # batch=2は7.7GB到達で共有VRAM溢れ → 1に戻す
  gradient_accumulation_steps: 8           # 実効バッチ=8
  gradient_checkpointing: true
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_steps: 100
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 50
  save_steps: 1000                          # 500→1000: evalを半分に減らす
  save_total_limit: 3
  bf16: true
  fp16: false
  tf32: true                                # Blackwell(RTX 5060)はTF32対応、行列演算高速化
  dataloader_num_workers: 4                 # 2→4: CPUデータロード並列化
  dataloader_pin_memory: true              # GPU転送を高速化
  remove_unused_columns: false
  report_to: "none"                         # set "wandb" to enable tracking

data:
  train_file: "data/processed/cpt_train.jsonl"
  eval_file: "data/processed/cpt_eval.jsonl"
  max_seq_length: 512                       # チャンクが512文字≈350トークン、1024は無駄
  text_column: "text"
  eval_split_ratio: 0.05
  max_train_samples: 45000                  # 5.01s/step × 5625steps ≈ 7.8時間（batch=1基準）
  max_eval_samples: 500                     # 5445→500: eval 1回 15分→90秒に短縮
